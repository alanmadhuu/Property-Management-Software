services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=pms
    ports:
      - "3307:3306"
    volumes:
      # Auto-initialize the database with the schema
      - ./pms_schema.sql:/docker-entrypoint-initdb.d/init.sql
